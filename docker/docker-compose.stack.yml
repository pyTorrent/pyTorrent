# Note: Full rTorrent + pyTorrent deployment with a private Docker network.
services:
  rtorrent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.rtorrent
      args:
        RTORRENT_BASE_IMAGE: ${RTORRENT_BASE_IMAGE:-debian:13-slim}
    image: ${RTORRENT_IMAGE:-localhost/pytorrent-rtorrent:local}
    container_name: pytorrent-rtorrent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TERM: ${RTORRENT_TERM:-xterm}
    tty: true
    ports:
      - "${RTORRENT_TORRENT_PORT:-51300}:${RTORRENT_TORRENT_PORT:-51300}/tcp"
      - "${RTORRENT_TORRENT_PORT:-51300}:${RTORRENT_TORRENT_PORT:-51300}/udp"
    volumes:
      - rtorrent-session:/session
      - rtorrent-config:/config
      - rtorrent-logs:/logs
      - ${RTORRENT_DOWNLOADS_PATH:-./rtorrent-data/downloads}:/downloads
      - ${RTORRENT_WATCH_PATH:-./rtorrent-data/watch}:/watch
    networks:
      pytorrent-net:
        ipv4_address: ${RTORRENT_IPV4:-10.89.90.10}
        aliases:
          - rtorrent
          - pytorrent-rtorrent

  pytorrent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.pytorrent
      args:
        PYTORRENT_BASE_IMAGE: ${PYTORRENT_BASE_IMAGE:-python:3.14-alpine}
    image: ${PYTORRENT_IMAGE:-localhost/pytorrent:local}
    container_name: pytorrent
    restart: unless-stopped
    depends_on:
      - rtorrent
    env_file:
      - .env
    environment:
      PYTORRENT_RTORRENT_SCGI_URL: ${PYTORRENT_RTORRENT_SCGI_URL:-scgi://rtorrent:5000}
    extra_hosts:
      - "rtorrent:${RTORRENT_IPV4:-10.89.90.10}"
      - "pytorrent-rtorrent:${RTORRENT_IPV4:-10.89.90.10}"
    ports:
      - "${PYTORRENT_HTTP_PORT:-8090}:8090"
    volumes:
      - pytorrent-data:/data
    networks:
      pytorrent-net:
        aliases:
          - pytorrent

volumes:
  pytorrent-data:
  rtorrent-session:
  rtorrent-config:
  rtorrent-logs:

networks:
  pytorrent-net:
    driver: bridge
    ipam:
      config:
        - subnet: ${PYTORRENT_NETWORK_SUBNET:-10.89.90.0/24}
