# Note: pyTorrent-only deployment for an existing rTorrent SCGI endpoint.
services:
  pytorrent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.pytorrent
      args:
        PYTORRENT_BASE_IMAGE: ${PYTORRENT_BASE_IMAGE:-python:3.14-alpine}
    image: ${PYTORRENT_IMAGE:-localhost/pytorrent:local}
    container_name: pytorrent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PYTORRENT_RTORRENT_SCGI_URL: ${PYTORRENT_RTORRENT_SCGI_URL:-scgi://127.0.0.1:5000}
    ports:
      - "${PYTORRENT_HTTP_PORT:-8090}:8090"
    volumes:
      - pytorrent-data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - pytorrent-net

volumes:
  pytorrent-data:

networks:
  pytorrent-net:
    driver: bridge
